<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bike Route Maker</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQnFqD1q8sK8rjGfJYo4R8N4gD4v9qM="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel" aria-label="Route planner controls">
        <div class="brand-row">
          <div>
            <p class="eyebrow">Bike Route Maker</p>
            <h1>Plan a better ride</h1>
          </div>
          <button id="locateBtn" class="icon-button" type="button" title="Use current location" aria-label="Use current location">
            <span aria-hidden="true">⌖</span>
          </button>
        </div>

        <form id="routeForm" class="route-form">
          <label>
            Start
            <input id="startInput" name="start" autocomplete="street-address" placeholder="Address, place, or click map" required />
          </label>
          <label>
            Destination
            <input id="endInput" name="end" autocomplete="street-address" placeholder="Address, place, or click map" required />
          </label>

          <div class="two-col">
            <label>
              Route source
              <select id="providerSelect" name="provider">
                <option value="osrm-bike">Free OSM bike</option>
                <option value="osrm-foot">Free sidewalks/foot</option>
                <option value="ors">OpenRouteService</option>
              </select>
            </label>
            <label>
              Bike profile
              <select id="profileSelect" name="profile">
                <option value="cycling-regular">Everyday</option>
                <option value="cycling-road">Road</option>
                <option value="cycling-electric">E-bike</option>
                <option value="cycling-mountain">Mountain</option>
              </select>
            </label>
            <label>
              Preference
              <select id="preferenceSelect" name="preference">
                <option value="recommended">Recommended</option>
                <option value="shortest">Shortest</option>
              </select>
            </label>
          </div>

          <label>
            OpenRouteService API key
            <input id="apiKeyInput" name="apiKey" placeholder="Paste key for real bike routing" />
          </label>

          <div class="button-row">
            <button class="primary" type="submit">Make Route</button>
            <button id="swapBtn" type="button">Swap</button>
            <button id="clearBtn" type="button">Clear</button>
          </div>
        </form>

        <div id="message" class="message" role="status">
          Paste an API key, enter two places, then make a route. Without a key, the map can still place points and preview a direct line.
        </div>

        <section class="account" aria-label="Account and saved trips">
          <div class="section-title">
            <h2>Account</h2>
            <button id="logoutBtn" type="button" hidden>Sign Out</button>
          </div>
          <form id="authForm" class="auth-form">
            <label>
              Email
              <input id="emailInput" name="email" type="email" autocomplete="email" placeholder="you@example.com" />
            </label>
            <label>
              Password
              <input id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="8+ characters" />
            </label>
            <div class="button-row">
              <button id="loginBtn" type="submit">Sign In</button>
              <button id="signupBtn" type="button">Create Account</button>
            </div>
          </form>
          <div id="accountStatus" class="account-status">Neon-backed accounts activate after `DATABASE_URL` is set on the server.</div>
          <div class="save-trip-row">
            <input id="tripNameInput" placeholder="Trip name" />
            <button id="saveTripBtn" type="button" disabled>Save Trip</button>
          </div>
          <div id="tripsList" class="trips-list"></div>
        </section>

        <section class="stats" aria-label="Route summary">
          <div>
            <span>Distance</span>
            <strong id="distanceStat">--</strong>
          </div>
          <div>
            <span>Ride time</span>
            <strong id="timeStat">--</strong>
          </div>
          <div>
            <span>Climb</span>
            <strong id="climbStat">--</strong>
          </div>
        </section>

        <div class="export-row">
          <button id="sidewalkBtn" type="button">Show Sidewalks</button>
          <button id="downloadGeojsonBtn" type="button" disabled>Download GeoJSON</button>
          <button id="copyApiBtn" type="button">Copy API Example</button>
        </div>

        <section class="steps-wrap" aria-label="Turn by turn directions">
          <h2>Turns</h2>
          <ol id="stepsList" class="steps-list"></ol>
        </section>
      </section>

      <section class="map-section" aria-label="Interactive route map">
        <div id="map"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
