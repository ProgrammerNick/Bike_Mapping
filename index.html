<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bike Route Maker</title>
    <link rel="stylesheet" href="./vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="./styles.css?v=4" />
  </head>
  <body>
    <main id="appView" class="app-canvas">
      <div id="map" class="app-map"></div>

      <section class="panel" aria-label="Route planner controls">
        <div class="brand-row">
          <div>
            <p class="eyebrow">Bike Route Maker</p>
            <h1>Plan a ride</h1>
          </div>
          <div class="brand-actions">
            <select id="tileStyleSelect" class="tile-style-select" aria-label="Map style" title="Map style">
              <option value="positron">Map</option>
              <option value="voyager">Vivid</option>
              <option value="dark">Dark</option>
              <option value="osm">Plain</option>
              <option value="mapbox-outdoors" hidden>Mapbox Outdoors</option>
              <option value="mapbox-streets" hidden>Mapbox Streets</option>
            </select>
            <button id="locateBtn" class="icon-button" type="button" title="Use current location" aria-label="Use current location">
              <span aria-hidden="true">⌖</span>
            </button>
          </div>
        </div>

        <form id="routeForm" class="route-form">
          <div id="stopsList" class="stops-list" aria-label="Route stops"></div>
          <button id="addStopBtn" type="button" class="ghost-btn">+ Add stop</button>

          <div class="button-row">
            <button class="primary" type="submit">Make Route</button>
            <button id="reverseBtn" type="button">Reverse</button>
            <button id="clearBtn" type="button">Clear</button>
          </div>

          <details class="advanced">
            <summary>Advanced options</summary>
            <div class="advanced-body">
              <div class="two-col">
                <label>
                  Bike profile
                  <select id="profileSelect">
                    <option value="cycling-regular">Everyday</option>
                    <option value="cycling-road">Road</option>
                    <option value="cycling-electric">E-bike</option>
                    <option value="cycling-mountain">Mountain</option>
                  </select>
                </label>
                <label>
                  Preference
                  <select id="preferenceSelect">
                    <option value="recommended">Recommended</option>
                    <option value="shortest">Shortest</option>
                  </select>
                </label>
              </div>
            </div>
          </details>
        </form>

        <div id="message" class="message" role="status">
          Click points on the map or start typing a place to plan a ride.
        </div>

        <section class="stats" aria-label="Route summary">
          <div>
            <span>Distance</span>
            <strong id="distanceStat">--</strong>
          </div>
          <div>
            <span>Ride time</span>
            <strong id="timeStat">--</strong>
          </div>
          <div>
            <span>Climb</span>
            <strong id="climbStat">--</strong>
          </div>
        </section>

        <figure id="elevationFigure" class="elevation-figure" hidden>
          <figcaption>
            <span>Elevation</span>
            <span id="elevationRange" class="elevation-range"></span>
          </figcaption>
          <svg id="elevationChart" viewBox="0 0 600 110" preserveAspectRatio="none" aria-label="Elevation profile"></svg>
        </figure>

        <div class="export-row">
          <button id="downloadGpxBtn" type="button" disabled>Download GPX</button>
          <button id="downloadGeojsonBtn" type="button" disabled>Download GeoJSON</button>
        </div>

        <section class="account" id="accountSection" aria-label="Account">
          <div class="section-title">
            <h2 id="accountHeading">Account</h2>
            <button id="logoutBtn" type="button" hidden>Sign Out</button>
          </div>
          <div id="accountStatus" class="account-status">Sign in to save trips and unlock higher rate limits — or keep using the app as a guest.</div>
          <form id="authForm" class="auth-form">
            <label>
              Email
              <input id="emailInput" name="email" type="email" autocomplete="email" placeholder="you@example.com" />
            </label>
            <label>
              Password
              <input id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="8+ characters" minlength="8" />
            </label>
            <div class="button-row">
              <button class="primary" type="submit">Sign In</button>
              <button id="signupBtn" type="button">Create Account</button>
            </div>
          </form>
        </section>

        <section class="account" aria-label="Saved trips" id="tripsSection" hidden>
          <div class="section-title">
            <h2>Saved trips</h2>
          </div>
          <div class="save-trip-row">
            <input id="tripNameInput" placeholder="Trip name (optional)" />
            <button id="saveTripBtn" type="button" disabled>Save Trip</button>
          </div>
          <div id="tripsList" class="trips-list"></div>
        </section>

        <section class="favorites" aria-label="Saved favorite places" id="favoritesSection">
          <div class="section-title">
            <h2>Favorites</h2>
          </div>
          <div id="favoritesList" class="favorites-list"></div>
        </section>

        <section class="steps-wrap" aria-label="Turn by turn directions">
          <h2>Turns</h2>
          <ol id="stepsList" class="steps-list"></ol>
        </section>
      </section>
    </main>

    <script src="./vendor/leaflet/leaflet.js"></script>
    <script src="./app.js?v=4"></script>
  </body>
</html>
